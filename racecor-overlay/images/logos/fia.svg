<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" style="filter: drop-shadow(0 0 1.5px rgba(14,30,91,0.3)) drop-shadow(0 0 3px rgba(14,30,91,0.15))"><g transform="translate(6,16) scale(0.85)"><g fill="#FFFFFF" fill-rule="evenodd">
<!-- Globe circle (left) -->
<circle cx="32" cy="28" r="26" fill="none" stroke="#FFFFFF" stroke-width="2.8"/>
<!-- Globe vertical meridian -->
<line x1="32" y1="2" x2="32" y2="54" stroke="#FFFFFF" stroke-width="1.8"/>
<!-- Globe horizontal equator -->
<line x1="6" y1="28" x2="58" y2="28" stroke="#FFFFFF" stroke-width="1.8"/>
<!-- Globe curved meridians (elliptic arcs) -->
<ellipse cx="32" cy="28" rx="13" ry="26" fill="none" stroke="#FFFFFF" stroke-width="1.4"/>
<!-- Globe latitude lines -->
<ellipse cx="32" cy="28" rx="26" ry="10" fill="none" stroke="#FFFFFF" stroke-width="1.4"/>
<!-- Globe diagonal (NW-SE) -->
<line x1="13" y1="6" x2="51" y2="50" stroke="#FFFFFF" stroke-width="1.4"/>
<!-- Globe diagonal (NE-SW) -->
<line x1="51" y1="6" x2="13" y2="50" stroke="#FFFFFF" stroke-width="1.4"/>

<!-- Gear circle (right, overlapping) -->
<circle cx="50" cy="28" r="24" fill="none" stroke="#FFFFFF" stroke-width="2.8"/>
<!-- Gear teeth (right side of gear circle) -->
<g stroke="#FFFFFF" stroke-width="2.2" fill="none">
  <line x1="73.5" y1="24" x2="73.5" y2="20" transform="rotate(-60 50 28)"/>
  <line x1="73.5" y1="24" x2="73.5" y2="20" transform="rotate(-45 50 28)"/>
  <line x1="73.5" y1="24" x2="73.5" y2="20" transform="rotate(-30 50 28)"/>
  <line x1="73.5" y1="24" x2="73.5" y2="20" transform="rotate(-15 50 28)"/>
  <line x1="73.5" y1="24" x2="73.5" y2="20" transform="rotate(0 50 28)"/>
  <line x1="73.5" y1="24" x2="73.5" y2="20" transform="rotate(15 50 28)"/>
  <line x1="73.5" y1="24" x2="73.5" y2="20" transform="rotate(30 50 28)"/>
  <line x1="73.5" y1="24" x2="73.5" y2="20" transform="rotate(45 50 28)"/>
  <line x1="73.5" y1="24" x2="73.5" y2="20" transform="rotate(60 50 28)"/>
</g>

<!-- FIA text -->
<text x="38" y="38" font-family="Arial Black,Arial,Helvetica,sans-serif" font-weight="900" font-size="26" text-anchor="middle" fill="#FFFFFF" letter-spacing="-1">FiA</text>
</g></g></svg>
