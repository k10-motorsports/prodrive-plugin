<svg viewBox="0 0 144 144" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="144" height="144" fill="#1a1a2e" rx="16"/>

  <!-- Eye icon -->
  <g transform="translate(72, 48)">
    <!-- Eyelid top -->
    <path d="M -20 -8 Q 0 -16 20 -8" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Eyelid bottom -->
    <path d="M -20 8 Q 0 16 20 8" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Pupil -->
    <circle cx="0" cy="0" r="6" fill="white"/>
  </g>

  <!-- Label -->
  <text x="72" y="128" font-family="system-ui" font-size="14" fill="rgba(255,255,255,0.6)" text-anchor="middle">Show/Hide</text>
</svg>