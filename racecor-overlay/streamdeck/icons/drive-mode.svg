<svg viewBox="0 0 144 144" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="144" height="144" fill="#1a1a2e" rx="16"/>

  <!-- Steering wheel icon (purple) -->
  <g transform="translate(72, 48)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="16" fill="none" stroke="#6c5ce7" stroke-width="2"/>
    <!-- Center hub -->
    <circle cx="0" cy="0" r="4" fill="#6c5ce7"/>
    <!-- Top spoke -->
    <line x1="0" y1="-16" x2="0" y2="-8" stroke="#6c5ce7" stroke-width="2" stroke-linecap="round"/>
    <!-- Bottom spoke -->
    <line x1="0" y1="16" x2="0" y2="8" stroke="#6c5ce7" stroke-width="2" stroke-linecap="round"/>
    <!-- Right spoke -->
    <line x1="16" y1="0" x2="8" y2="0" stroke="#6c5ce7" stroke-width="2" stroke-linecap="round"/>
    <!-- Left spoke -->
    <line x1="-16" y1="0" x2="-8" y2="0" stroke="#6c5ce7" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Label -->
  <text x="72" y="128" font-family="system-ui" font-size="14" fill="rgba(255,255,255,0.6)" text-anchor="middle">Drive Mode</text>
</svg>