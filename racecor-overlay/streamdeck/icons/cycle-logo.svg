<svg viewBox="0 0 144 144" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="144" height="144" fill="#1a1a2e" rx="16"/>

  <!-- Car silhouette with arrows -->
  <g transform="translate(72, 48)">
    <!-- Car body -->
    <ellipse cx="0" cy="4" rx="14" ry="6" fill="none" stroke="white" stroke-width="2"/>
    <!-- Car roof -->
    <rect x="-8" y="-4" width="16" height="6" fill="none" stroke="white" stroke-width="2" stroke-linejoin="round"/>
    <!-- Front wheel -->
    <circle cx="-8" cy="10" r="3" fill="none" stroke="white" stroke-width="2"/>
    <!-- Rear wheel -->
    <circle cx="8" cy="10" r="3" fill="none" stroke="white" stroke-width="2"/>

    <!-- Left arrow -->
    <path d="M -22 4 L -26 4 L -24 2" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right arrow -->
    <path d="M 22 4 L 26 4 L 24 2" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Label -->
  <text x="72" y="128" font-family="system-ui" font-size="14" fill="rgba(255,255,255,0.6)" text-anchor="middle">Cycle Logo</text>
</svg>