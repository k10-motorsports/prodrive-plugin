<svg viewBox="0 0 144 144" xmlns="http://www.w3.org/2000/svg">
  <rect width="144" height="144" fill="#1a1a2e" rx="16"/>
  <g transform="translate(72, 48)">
    <!-- Stopwatch body -->
    <circle cx="0" cy="2" r="20" fill="none" stroke="white" stroke-width="2.5"/>
    <!-- Crown/button -->
    <rect x="-3" y="-24" width="6" height="6" rx="1" fill="white"/>
    <!-- Clock hand -->
    <line x1="0" y1="2" x2="0" y2="-10" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="2" x2="10" y2="6" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="72" y="128" font-family="system-ui" font-size="12" fill="rgba(255,255,255,0.6)" text-anchor="middle">Qualifying</text>
</svg>