<svg viewBox="0 0 144 144" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="144" height="144" fill="#1a1a2e" rx="16"/>

  <!-- Gear icon -->
  <g transform="translate(72, 48)">
    <!-- Center circle -->
    <circle cx="0" cy="0" r="6" fill="none" stroke="white" stroke-width="2"/>

    <!-- Outer gear teeth -->
    <circle cx="0" cy="0" r="20" fill="none" stroke="white" stroke-width="2"/>

    <!-- Top tooth -->
    <rect x="-3" y="-28" width="6" height="10" fill="white"/>
    <!-- Bottom tooth -->
    <rect x="-3" y="18" width="6" height="10" fill="white"/>
    <!-- Right tooth -->
    <rect x="18" y="-3" width="10" height="6" fill="white"/>
    <!-- Left tooth -->
    <rect x="-28" y="-3" width="10" height="6" fill="white"/>
  </g>

  <!-- Label -->
  <text x="72" y="128" font-family="system-ui" font-size="14" fill="rgba(255,255,255,0.6)" text-anchor="middle">Settings</text>
</svg>