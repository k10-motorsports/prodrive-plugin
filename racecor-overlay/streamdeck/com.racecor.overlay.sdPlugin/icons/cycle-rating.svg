<svg viewBox="0 0 144 144" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="144" height="144" fill="#1a1a2e" rx="16"/>

  <!-- Bar chart with cycling arrows -->
  <g transform="translate(72, 48)">
    <!-- Bar 1 -->
    <rect x="-12" y="0" width="4" height="12" fill="white"/>
    <!-- Bar 2 -->
    <rect x="-4" y="-4" width="4" height="16" fill="white"/>
    <!-- Bar 3 -->
    <rect x="4" y="-2" width="4" height="14" fill="white"/>

    <!-- Cycling arrows (curved around) -->
    <!-- Left arrow -->
    <path d="M -16 -10 L -20 -10 L -18 -12" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right arrow -->
    <path d="M 16 -10 L 20 -10 L 18 -12" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Arc connecting -->
    <path d="M -16 -8 Q 0 -16 16 -8" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Label -->
  <text x="72" y="128" font-family="system-ui" font-size="14" fill="rgba(255,255,255,0.6)" text-anchor="middle">Cycle Rating</text>
</svg>