<svg viewBox="0 0 144 144" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="144" height="144" fill="#1a1a2e" rx="16"/>

  <!-- Map pin with circular arrow -->
  <g transform="translate(72, 48)">
    <!-- Map pin -->
    <path d="M 0 -12 C -7 -12 -12 -7 -12 0 C -12 8 0 18 0 18 C 0 18 12 8 12 0 C 12 -7 7 -12 0 -12 Z" fill="none" stroke="white" stroke-width="2" stroke-linejoin="round"/>
    <!-- Pin dot -->
    <circle cx="0" cy="0" r="4" fill="white"/>

    <!-- Circular arrow around -->
    <path d="M 16 -4 A 12 12 0 0 1 16 8" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <!-- Arrow head -->
    <path d="M 16 8 L 12 6 L 14 2" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Label -->
  <text x="72" y="128" font-family="system-ui" font-size="14" fill="rgba(255,255,255,0.6)" text-anchor="middle">Reset Map</text>
</svg>