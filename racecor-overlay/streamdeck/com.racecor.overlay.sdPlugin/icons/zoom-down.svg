<svg viewBox="0 0 144 144" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="144" height="144" fill="#1a1a2e" rx="16"/>

  <!-- Magnifying glass with minus -->
  <g transform="translate(72, 48)">
    <!-- Magnifying glass circle -->
    <circle cx="-2" cy="-2" r="14" fill="none" stroke="white" stroke-width="2"/>
    <!-- Handle -->
    <line x1="10" y1="10" x2="18" y2="18" stroke="white" stroke-width="2" stroke-linecap="round"/>

    <!-- Minus sign inside -->
    <line x1="-8" y1="-2" x2="4" y2="-2" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Label -->
  <text x="72" y="128" font-family="system-ui" font-size="14" fill="rgba(255,255,255,0.6)" text-anchor="middle">Zoom -</text>
</svg>