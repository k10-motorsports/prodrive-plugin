<svg viewBox="0 0 144 144" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="144" height="144" fill="#1a1a2e" rx="16"/>

  <!-- Expand/fullscreen arrows -->
  <g transform="translate(72, 48)">
    <!-- Top-left corner -->
    <path d="M -12 -12 L -6 -12 L -12 -6" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Top-right corner -->
    <path d="M 12 -12 L 6 -12 L 12 -6" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Bottom-left corner -->
    <path d="M -12 12 L -6 12 L -12 6" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Bottom-right corner -->
    <path d="M 12 12 L 6 12 L 12 6" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Label -->
  <text x="72" y="128" font-family="system-ui" font-size="14" fill="rgba(255,255,255,0.6)" text-anchor="middle">Fullscreen</text>
</svg>