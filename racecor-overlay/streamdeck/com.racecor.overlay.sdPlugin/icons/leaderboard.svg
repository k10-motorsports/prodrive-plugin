<svg viewBox="0 0 144 144" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="144" height="144" fill="#1a1a2e" rx="16"/>

  <!-- List/ranking icon with 1-2-3 -->
  <g transform="translate(72, 48)">
    <!-- Line 1 with "1" -->
    <text x="-16" y="-6" font-family="system-ui" font-size="12" font-weight="bold" fill="white" text-anchor="middle">1</text>
    <line x1="0" y1="-10" x2="16" y2="-10" stroke="white" stroke-width="2" stroke-linecap="round"/>

    <!-- Line 2 with "2" -->
    <text x="-16" y="4" font-family="system-ui" font-size="12" font-weight="bold" fill="white" text-anchor="middle">2</text>
    <line x1="0" y1="0" x2="16" y2="0" stroke="white" stroke-width="2" stroke-linecap="round"/>

    <!-- Line 3 with "3" -->
    <text x="-16" y="14" font-family="system-ui" font-size="12" font-weight="bold" fill="white" text-anchor="middle">3</text>
    <line x1="0" y1="10" x2="16" y2="10" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Label -->
  <text x="72" y="128" font-family="system-ui" font-size="14" fill="rgba(255,255,255,0.6)" text-anchor="middle">Leaderboard</text>
</svg>