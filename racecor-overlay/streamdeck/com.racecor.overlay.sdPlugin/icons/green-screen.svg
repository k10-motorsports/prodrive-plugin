<svg viewBox="0 0 144 144" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="144" height="144" fill="#1a1a2e" rx="16"/>

  <!-- Rectangle with green fill -->
  <g transform="translate(72, 48)">
    <!-- Border -->
    <rect x="-16" y="-12" width="32" height="24" fill="none" stroke="white" stroke-width="2" stroke-linejoin="round"/>
    <!-- Green fill inside -->
    <rect x="-12" y="-8" width="24" height="16" fill="#00e676"/>
  </g>

  <!-- Label -->
  <text x="72" y="128" font-family="system-ui" font-size="14" fill="rgba(255,255,255,0.6)" text-anchor="middle">Green Screen</text>
</svg>