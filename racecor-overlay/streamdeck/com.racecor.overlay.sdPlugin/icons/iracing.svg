<svg viewBox="0 0 144 144" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="144" height="144" fill="#1a1a2e" rx="16"/>

  <!-- iR text stylized (blue) -->
  <g transform="translate(72, 48)">
    <!-- "i" stem -->
    <rect x="-10" y="-8" width="3" height="16" fill="#1e88e5"/>
    <!-- "i" dot -->
    <circle cx="-8.5" cy="-12" r="2" fill="#1e88e5"/>

    <!-- "R" stem -->
    <rect x="0" y="-8" width="3" height="16" fill="#1e88e5"/>
    <!-- "R" top curve -->
    <path d="M 3 -8 Q 10 -8 10 -2 Q 10 2 3 2" fill="none" stroke="#1e88e5" stroke-width="2" stroke-linecap="round"/>
    <!-- "R" diagonal leg -->
    <line x1="10" y1="2" x2="16" y2="8" stroke="#1e88e5" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Label -->
  <text x="72" y="128" font-family="system-ui" font-size="14" fill="rgba(255,255,255,0.6)" text-anchor="middle">iRating</text>
</svg>