<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=360" />
  <title>RaceCor iRacing Sync</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #e5e5e5;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .header img { width: 24px; height: 24px; }
    .header h1 { font-size: 15px; font-weight: 600; color: #fff; }

    .account-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .account-bar .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #333;
      flex-shrink: 0;
    }
    .account-bar .account-info { flex: 1; min-width: 0; }
    .account-bar .account-name {
      color: #fff;
      font-weight: 600;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .account-bar .account-detail {
      color: #888;
      font-size: 11px;
    }
    .account-bar.no-account .account-name { color: #f87171; }

    .status-bar {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      font-size: 13px;
      text-align: center;
    }
    .status-bar .value { color: #e5e5e5; font-weight: 500; }
    .status-bar .value.error { color: #f87171; }
    .status-bar .value.success { color: #4ade80; }
    .status-bar .value.syncing { color: #facc15; }

    .progress-steps {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    .progress-step {
      flex: 1;
      height: 3px;
      border-radius: 2px;
      background: #2a2a2a;
      transition: background 0.3s;
    }
    .progress-step.done { background: #4ade80; }
    .progress-step.active { background: #facc15; }
    .progress-step.error { background: #f87171; }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      display: none;
    }
    .btn-primary {
      background: #c2410c;
      color: #fff;
    }
    .btn-primary:hover { background: #9a3412; }

    .results {
      margin-top: 12px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 12px;
      font-size: 12px;
      display: none;
    }
    .results .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px solid #222;
    }
    .results .stat-row:last-child { border-bottom: none; }
    .results .stat-label { color: #888; }
    .results .stat-value { color: #e5e5e5; font-weight: 500; }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #666;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .settings-toggle {
      margin-top: 12px;
      text-align: center;
    }
    .settings-toggle a {
      color: #555;
      font-size: 11px;
      text-decoration: none;
      cursor: pointer;
    }
    .settings-toggle a:hover { color: #888; }

    .settings {
      display: none;
      margin-top: 8px;
    }
    .settings.open { display: block; }
    .settings label {
      font-size: 11px;
      color: #666;
      display: block;
      margin-bottom: 4px;
    }
    .settings input {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 6px 8px;
      color: #e5e5e5;
      font-size: 11px;
      font-family: monospace;
    }
    .settings input:focus { outline: none; border-color: #c2410c; }
  </style>
</head>
<body>
  <div class="header">
    <img src="../icons/icon48.png" alt="RaceCor" />
    <h1>RaceCor iRacing Sync</h1>
  </div>

  <div class="account-bar" id="accountBar">
    <img class="avatar" id="accountAvatar" src="" alt="" />
    <div class="account-info">
      <div class="account-name" id="accountName">Checking…</div>
      <div class="account-detail" id="accountDetail"></div>
    </div>
  </div>

  <div class="progress-steps">
    <div class="progress-step" id="step1"></div>
    <div class="progress-step" id="step2"></div>
    <div class="progress-step" id="step3"></div>
  </div>

  <div class="status-bar">
    <div class="value" id="statusText">Initializing…</div>
  </div>

  <button class="btn btn-primary" id="retryBtn">Retry Sync</button>

  <div class="results" id="results">
    <div id="resultRows"></div>
  </div>

  <div class="settings-toggle">
    <a id="settingsLink">Settings</a>
  </div>
  <div class="settings" id="settingsPanel">
    <label>Sync endpoint</label>
    <input type="text" id="endpoint"
      value="https://prodrive.racecor.io/api/iracing/extension-sync" />
  </div>

  <script src="popup.js"></script>
</body>
</html>
