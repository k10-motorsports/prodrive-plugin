name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------
  # Build the Electron overlay for Windows
  # ---------------------------------------------------------------
  build-overlay-win:
    name: Build Overlay (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard-overlay/package-lock.json

      - name: Install dependencies
        working-directory: dashboard-overlay
        run: npm ci

      - name: Build overlay (win)
        working-directory: dashboard-overlay
        run: npx electron-builder --win --config electron-builder.yml --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload win-unpacked for Inno Setup
        uses: actions/upload-artifact@v4
        with:
          name: overlay-win-unpacked
          path: dashboard-overlay/dist/win-unpacked/

      - name: Upload overlay NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: overlay-win-setup
          path: dashboard-overlay/dist/K10-Media-Broadcaster-Setup-*.exe

      - name: Upload auto-update metadata
        uses: actions/upload-artifact@v4
        with:
          name: overlay-update-meta
          path: |
            dashboard-overlay/dist/latest.yml

  # ---------------------------------------------------------------
  # Build the Electron overlay for macOS (optional — does not block)
  # ---------------------------------------------------------------
  build-overlay-mac:
    name: Build Overlay (macOS)
    runs-on: macos-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard-overlay/package-lock.json

      - name: Install dependencies
        working-directory: dashboard-overlay
        run: npm ci

      - name: Build overlay (mac)
        working-directory: dashboard-overlay
        run: npx electron-builder --mac --config electron-builder.yml --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: overlay-mac
          path: dashboard-overlay/dist/*.dmg
          if-no-files-found: warn

  # ---------------------------------------------------------------
  # Compile the Inno Setup combined installer
  # The plugin DLL is pre-built and committed to the repo — no
  # CI build needed (requires SimHub's private reference DLLs).
  # ---------------------------------------------------------------
  build-installer:
    name: Build Windows Installer
    runs-on: windows-latest
    needs: [build-overlay-win]

    steps:
      - uses: actions/checkout@v4

      - name: Download overlay (win-unpacked)
        uses: actions/download-artifact@v4
        with:
          name: overlay-win-unpacked
          path: dashboard-overlay/dist/win-unpacked/

      - name: Verify plugin DLL exists in repo
        run: |
          if (!(Test-Path "simhub-plugin/K10MediaBroadcaster.Plugin.dll")) {
            Write-Error "Plugin DLL not found. Build locally with SimHub and commit before tagging."
            exit 1
          }
          Write-Host "Plugin DLL found: $(Get-Item simhub-plugin/K10MediaBroadcaster.Plugin.dll | Select-Object -ExpandProperty Length) bytes"
        shell: pwsh

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
        shell: cmd

      - name: Extract version from tag
        id: version
        run: echo "VERSION=$($env:GITHUB_REF_NAME -replace '^v','')" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Update version in .iss
        run: |
          $iss = Get-Content installer/k10-media-broadcaster.iss -Raw
          $iss = $iss -replace '#define MyAppVersion\s+"[^"]+"', "#define MyAppVersion   `"${{ steps.version.outputs.VERSION }}`""
          Set-Content installer/k10-media-broadcaster.iss $iss
        shell: pwsh

      - name: Compile installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\k10-media-broadcaster.iss
        shell: pwsh

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: installer/output/*.exe

  # ---------------------------------------------------------------
  # Create GitHub Release with all artifacts
  # ---------------------------------------------------------------
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-overlay-win, build-installer]

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/
          merge-multiple: false

      - name: List artifacts
        run: find release-artifacts/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/installer/*.exe
            release-artifacts/overlay-win-setup/*.exe
            release-artifacts/overlay-mac/*.dmg
            release-artifacts/overlay-update-meta/latest.yml
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
