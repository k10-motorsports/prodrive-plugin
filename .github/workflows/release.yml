name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------
  # Stamp version from git tag into all source files and push back
  # to main so the repo always reflects the latest release.
  # Runs on Ubuntu (fast) before any build jobs.
  # ---------------------------------------------------------------
  stamp-version:
    name: Stamp Version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Stamp all version files
        run: |
          VER="${{ steps.version.outputs.VERSION }}"

          # Pad to 4-part for AssemblyVersion
          IFS='.' read -ra PARTS <<< "$VER"
          while [[ ${#PARTS[@]} -lt 4 ]]; do PARTS+=("0"); done
          ASM_VER="${PARTS[0]}.${PARTS[1]}.${PARTS[2]}.${PARTS[3]}"

          echo "Version: $VER  Assembly: $ASM_VER"

          # package.json
          sed -i -E "s/\"version\": *\"[^\"]+\"/\"version\": \"$VER\"/" \
            racecor-overlay/package.json

          # Inno Setup .iss
          sed -i -E "s/#define MyAppVersion +\"[^\"]+\"/#define MyAppVersion   \"$VER\"/" \
            installer/k10-motorsports.iss

          # AssemblyInfo.cs
          ASMFILE="racecor-plugin/simhub-plugin/plugin/K10Motorsports.Plugin/Properties/AssemblyInfo.cs"
          sed -i -E "s/AssemblyVersion\(\"[^\"]+\"\)/AssemblyVersion(\"$ASM_VER\")/" "$ASMFILE"
          sed -i -E "s/AssemblyFileVersion\(\"[^\"]+\"\)/AssemblyFileVersion(\"$ASM_VER\")/" "$ASMFILE"

          git diff

      - name: Commit version bump to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add racecor-overlay/package.json installer/k10-motorsports.iss \
                 racecor-plugin/simhub-plugin/plugin/K10Motorsports.Plugin/Properties/AssemblyInfo.cs
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: bump version to ${{ steps.version.outputs.VERSION }} [skip ci]"
          git push origin main

  # ---------------------------------------------------------------
  # Build the Electron overlay for Windows
  # ---------------------------------------------------------------
  build-overlay-win:
    name: Build Overlay (Windows)
    runs-on: windows-latest
    needs: [stamp-version]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: racecor-overlay/package-lock.json

      - name: Install dependencies
        working-directory: racecor-overlay
        run: npm ci

      - name: Build overlay (win x64 + arm64)
        working-directory: racecor-overlay
        run: npx electron-builder --win --config electron-builder.yml --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload win-unpacked (x64) for Inno Setup
        uses: actions/upload-artifact@v4
        with:
          name: overlay-win-unpacked
          path: racecor-overlay/dist/win-unpacked/

      - name: Upload win-arm64-unpacked for Inno Setup
        uses: actions/upload-artifact@v4
        with:
          name: overlay-win-arm64-unpacked
          path: racecor-overlay/dist/win-arm64-unpacked/

  # ---------------------------------------------------------------
  # Build plugin + compile the Inno Setup combined installer
  # SimHub SDK DLLs are committed in lib/simhub-refs/ so the
  # plugin compiles on CI without a SimHub installation.
  # ---------------------------------------------------------------
  build-installer:
    name: Build Plugin & Installer
    runs-on: windows-latest
    needs: [build-overlay-win]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Download overlay (win x64)
        uses: actions/download-artifact@v4
        with:
          name: overlay-win-unpacked
          path: racecor-overlay/dist/win-unpacked/

      - name: Download overlay (win arm64)
        uses: actions/download-artifact@v4
        with:
          name: overlay-win-arm64-unpacked
          path: racecor-overlay/dist/win-arm64-unpacked/

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build plugin
        run: |
          dotnet build racecor-plugin/simhub-plugin/plugin/K10Motorsports.Plugin/K10Motorsports.Plugin.csproj -c Release
          if (!(Test-Path "racecor-plugin/simhub-plugin/RaceCor-ioProDrive.dll")) {
            Write-Error "Plugin DLL not produced by build."
            exit 1
          }
          Write-Host "Plugin DLL built: $(Get-Item racecor-plugin/simhub-plugin/RaceCor-ioProDrive.dll | Select-Object -ExpandProperty Length) bytes"
        shell: pwsh

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
        shell: cmd

      - name: Compile installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\k10-motorsports.iss
        shell: pwsh

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: installer/output/*.exe

  # ---------------------------------------------------------------
  # Create GitHub Release with all artifacts
  # ---------------------------------------------------------------
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-overlay-win, build-installer]

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/
          merge-multiple: false

      - name: List artifacts
        run: find release-artifacts/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/installer/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
