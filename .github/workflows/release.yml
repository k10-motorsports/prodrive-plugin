name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------
  # Build the Electron overlay for Windows
  # ---------------------------------------------------------------
  build-overlay-win:
    name: Build Overlay (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard-overlay/package-lock.json

      - name: Install dependencies
        working-directory: dashboard-overlay
        run: npm ci

      - name: Build overlay (win x64 + arm64)
        working-directory: dashboard-overlay
        run: npx electron-builder --win --config electron-builder.yml --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload win-unpacked (x64) for Inno Setup
        uses: actions/upload-artifact@v4
        with:
          name: overlay-win-unpacked
          path: dashboard-overlay/dist/win-unpacked/

      - name: Upload win-arm64-unpacked for Inno Setup
        uses: actions/upload-artifact@v4
        with:
          name: overlay-win-arm64-unpacked
          path: dashboard-overlay/dist/win-arm64-unpacked/

  # ---------------------------------------------------------------
  # Build the Electron overlay for macOS (optional — does not block)
  # ---------------------------------------------------------------
  build-overlay-mac:
    name: Build Overlay (macOS)
    runs-on: macos-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard-overlay/package-lock.json

      - name: Install dependencies
        working-directory: dashboard-overlay
        run: npm ci

      - name: Build overlay (mac)
        working-directory: dashboard-overlay
        run: npx electron-builder --mac --config electron-builder.yml --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Skip code signing on CI (no Apple Developer cert configured)
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # Workaround: arm64 APFS DMG creation can flake on GitHub Actions
          # runners due to hdiutil race condition. Increase retry delay.
          ELECTRON_BUILDER_TMP_DIR: ${{ runner.temp }}/eb-tmp

      - name: Upload macOS artifacts (DMG + zip fallback)
        uses: actions/upload-artifact@v4
        with:
          name: overlay-mac
          path: |
            dashboard-overlay/dist/*.dmg
            dashboard-overlay/dist/*.zip
          if-no-files-found: warn

  # ---------------------------------------------------------------
  # Build plugin + compile the Inno Setup combined installer
  # SimHub SDK DLLs are committed in lib/simhub-refs/ so the
  # plugin compiles on CI without a SimHub installation.
  # ---------------------------------------------------------------
  build-installer:
    name: Build Plugin & Installer
    runs-on: windows-latest
    needs: [build-overlay-win]

    steps:
      - uses: actions/checkout@v4

      - name: Download overlay (win x64)
        uses: actions/download-artifact@v4
        with:
          name: overlay-win-unpacked
          path: dashboard-overlay/dist/win-unpacked/

      - name: Download overlay (win arm64)
        uses: actions/download-artifact@v4
        with:
          name: overlay-win-arm64-unpacked
          path: dashboard-overlay/dist/win-arm64-unpacked/

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=$($env:GITHUB_REF_NAME -replace '^v','')" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Stamp plugin version from tag
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          # Pad to 4-part version for AssemblyVersion (e.g. 0.0.8 → 0.0.8.0)
          $parts = $ver.Split('.')
          while ($parts.Count -lt 4) { $parts += '0' }
          $asmVer = $parts -join '.'
          $file = "simhub-plugin/plugin/K10Motorsports.Plugin/Properties/AssemblyInfo.cs"
          $content = Get-Content $file -Raw
          $content = $content -replace 'AssemblyVersion\("[^"]+"\)', "AssemblyVersion(`"$asmVer`")"
          $content = $content -replace 'AssemblyFileVersion\("[^"]+"\)', "AssemblyFileVersion(`"$asmVer`")"
          Set-Content $file $content
          Write-Host "Stamped plugin version: $asmVer"
        shell: pwsh

      - name: Build plugin
        run: |
          dotnet build simhub-plugin/plugin/K10Motorsports.Plugin/K10Motorsports.Plugin.csproj -c Release
          if (!(Test-Path "simhub-plugin/K10Motorsports.Plugin.dll")) {
            Write-Error "Plugin DLL not produced by build."
            exit 1
          }
          Write-Host "Plugin DLL built: $(Get-Item simhub-plugin/K10Motorsports.Plugin.dll | Select-Object -ExpandProperty Length) bytes"
        shell: pwsh

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
        shell: cmd

      - name: Stamp overlay version from tag
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          # package.json — Electron reads this via app.getVersion(),
          # dashboard.html picks it up at runtime through the preload bridge
          $pkg = Get-Content dashboard-overlay/package.json -Raw
          $pkg = $pkg -replace '"version":\s*"[^"]+"', "`"version`": `"$ver`""
          Set-Content dashboard-overlay/package.json $pkg
          # dashboard.html settings footer
          $html = Get-Content dashboard-overlay/dashboard.html -Raw
          $html = $html -replace 'K10 Motorsports[^<]*—[^<]*', "K10 Motorsports v$ver — Media Overlay"
          Set-Content dashboard-overlay/dashboard.html $html
          Write-Host "Stamped overlay version: $ver"
        shell: pwsh

      - name: Update version in .iss
        run: |
          $iss = Get-Content installer/k10-motorsports.iss -Raw
          $iss = $iss -replace '#define MyAppVersion\s+"[^"]+"', "#define MyAppVersion   `"${{ steps.version.outputs.VERSION }}`""
          Set-Content installer/k10-motorsports.iss $iss
        shell: pwsh

      - name: Compile installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\k10-motorsports.iss
        shell: pwsh

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: installer/output/*.exe

  # ---------------------------------------------------------------
  # Create GitHub Release with all artifacts
  # ---------------------------------------------------------------
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-overlay-win, build-installer]

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/
          merge-multiple: false

      - name: List artifacts
        run: find release-artifacts/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/installer/*.exe
            release-artifacts/overlay-mac/*.dmg
            release-artifacts/overlay-mac/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
