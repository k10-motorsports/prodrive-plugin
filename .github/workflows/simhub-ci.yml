name: SimHub CI

on:
  push:
    branches: [main, master]
    paths:
      - "simhub-plugin/**"
  pull_request:
    branches: [main, master]
    paths:
      - "simhub-plugin/**"

jobs:

  # ---------------------------------------------------------------
  # Python tests: dataset validation, telemetry replay, installer
  # No external dependencies — runs on stdlib alone
  # ---------------------------------------------------------------
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dataset validation (28 tests)
        run: python3 simhub-plugin/tests/validate_datasets.py -v

      - name: Installer and export tests (34 tests)
        run: python3 simhub-plugin/tools/test_installer.py -v

  # ---------------------------------------------------------------
  # Build plugin from source (verifies C# compiles on CI)
  # SimHub SDK DLLs committed in lib/simhub-refs/
  # ---------------------------------------------------------------
  build-plugin:
    name: Build Plugin
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build plugin (Release)
        run: dotnet build simhub-plugin/plugin/K10Motorsports.Plugin/K10Motorsports.Plugin.csproj -c Release

      - name: Verify DLL was produced
        run: |
          if (!(Test-Path "simhub-plugin/K10Motorsports.Plugin.dll")) {
            Write-Error "Plugin DLL not produced by build."
            exit 1
          }
          Write-Host "OK: K10Motorsports.Plugin.dll built successfully"
        shell: pwsh

  # ---------------------------------------------------------------
  # C# unit tests: trigger evaluation, fragments, colors, datasets
  # Uses standalone TestHelpers — no SimHub required
  # ---------------------------------------------------------------
  dotnet-tests:
    name: C# Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "6.0.x"

      - name: Restore NuGet packages
        run: dotnet restore simhub-plugin/tests/K10Motorsports.Tests/K10Motorsports.Tests.csproj

      - name: Build test project
        run: dotnet build simhub-plugin/tests/K10Motorsports.Tests/K10Motorsports.Tests.csproj --no-restore

      - name: Run tests (200+ tests)
        run: dotnet test simhub-plugin/tests/K10Motorsports.Tests/K10Motorsports.Tests.csproj --no-build --verbosity normal

  # ---------------------------------------------------------------
  # Windows-only: live .bat execution against fake SimHub directory
  # ---------------------------------------------------------------
  windows-installer:
    name: Windows Installer (live)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run live installer tests (3 tests)
        run: python simhub-plugin/tools/test_installer.py --live -v
