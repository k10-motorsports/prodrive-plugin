name: Beta Build

# Produces an installable prerelease for any PR that carries the `beta` label.
# The installer is attached to a prerelease tagged `beta-<branch>-<sha7>` so it
# has a stable public URL for sharing with testers. Does NOT stamp version
# files (that's reserved for tag-driven stable releases via release.yml) and
# does NOT mark the release as "latest".
#
# Remove the `beta` label to stop further builds on push.

on:
  pull_request:
    types: [labeled, synchronize, opened, reopened]

permissions:
  contents: write        # create / update the prerelease
  pull-requests: write   # comment the download URL on the PR

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------
  # Electron overlay — win x64 + arm64 (unpacked)
  # ---------------------------------------------------------------
  build-overlay-win:
    name: Build Overlay (Windows)
    runs-on: windows-latest
    if: >
      contains(github.event.pull_request.labels.*.name, 'beta') &&
      github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: racecor-overlay/package-lock.json

      - name: Install dependencies
        working-directory: racecor-overlay
        run: npm ci

      - name: Build overlay (win x64 + arm64)
        working-directory: racecor-overlay
        run: npx electron-builder --win --config electron-builder.yml --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload win-unpacked (x64) for Inno Setup
        uses: actions/upload-artifact@v4
        with:
          name: overlay-win-unpacked
          path: racecor-overlay/dist/win-unpacked/

      - name: Upload win-arm64-unpacked for Inno Setup
        uses: actions/upload-artifact@v4
        with:
          name: overlay-win-arm64-unpacked
          path: racecor-overlay/dist/win-arm64-unpacked/

  # ---------------------------------------------------------------
  # Plugin DLL + Inno Setup installer + publish prerelease
  # ---------------------------------------------------------------
  build-installer:
    name: Build Plugin & Installer
    runs-on: windows-latest
    needs: [build-overlay-win]
    if: >
      contains(github.event.pull_request.labels.*.name, 'beta') &&
      github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Download overlay (win x64)
        uses: actions/download-artifact@v4
        with:
          name: overlay-win-unpacked
          path: racecor-overlay/dist/win-unpacked/

      - name: Download overlay (win arm64)
        uses: actions/download-artifact@v4
        with:
          name: overlay-win-arm64-unpacked
          path: racecor-overlay/dist/win-arm64-unpacked/

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build plugin
        shell: pwsh
        run: |
          dotnet build racecor-plugin/simhub-plugin/plugin/RaceCorProDrive.Plugin/RaceCorProDrive.Plugin.csproj -c Release
          if (!(Test-Path "racecor-plugin/simhub-plugin/RaceCorProDrive.dll")) {
            Write-Error "Plugin DLL not produced by build."
            exit 1
          }
          Write-Host "Plugin DLL built: $(Get-Item racecor-plugin/simhub-plugin/RaceCorProDrive.dll | Select-Object -ExpandProperty Length) bytes"

      - name: Install Inno Setup
        shell: cmd
        run: choco install innosetup -y --no-progress

      - name: Compile installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\racecor-prodrive.iss

      - name: Stamp installer with beta id
        id: stamp
        shell: pwsh
        run: |
          $sha    = "${{ github.event.pull_request.head.sha }}".Substring(0,7)
          $branch = "${{ github.head_ref }}" -replace '[^A-Za-z0-9._-]','-'
          $src    = Get-ChildItem installer/output/*.exe | Select-Object -First 1
          if (-not $src) { Write-Error "No installer .exe produced by Inno Setup."; exit 1 }
          $dst    = "installer/output/K10-Motorsports-Setup-beta-$branch-$sha.exe"
          Move-Item -Force $src.FullName $dst
          "installer_path=$dst"         >> $env:GITHUB_OUTPUT
          "tag=beta-$branch-$sha"       >> $env:GITHUB_OUTPUT
          "title=Beta · $branch · $sha" >> $env:GITHUB_OUTPUT

      - name: Publish prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.stamp.outputs.tag }}
          name: ${{ steps.stamp.outputs.title }}
          target_commitish: ${{ github.event.pull_request.head.sha }}
          files: ${{ steps.stamp.outputs.installer_path }}
          prerelease: true
          make_latest: "false"
          body: |
            Beta build from PR #${{ github.event.pull_request.number }} — `${{ github.head_ref }}` @ `${{ github.event.pull_request.head.sha }}`

            PR: ${{ github.event.pull_request.html_url }}

            **Not a stable release.** Do not auto-update to this version.
            Installing will overwrite your current plugin; reinstall the latest
            stable build from the Releases page to return to the stable channel.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on PR with download link
        uses: actions/github-script@v7
        with:
          script: |
            const tag  = '${{ steps.stamp.outputs.tag }}';
            const { owner, repo } = context.repo;
            const url = `https://github.com/${owner}/${repo}/releases/tag/${tag}`;
            await github.rest.issues.createComment({
              owner, repo,
              issue_number: context.issue.number,
              body: `🟦 Beta build ready: ${url}`
            });
