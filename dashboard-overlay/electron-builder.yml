appId: org.k10motorsports.broadcaster
productName: K10 Motorsports
copyright: Copyright (c) 2026 Kevin Conboy

files:
  - main.js
  - preload.js
  - remote-server.js
  - dashboard.html
  - modules/**/*
  - images/**/*
  - data/**/*
  - streamdeck/**/*
  - "!**/node_modules/**/*"
  - "!**/tests/**/*"
  - "!**/test-results/**/*"
  - "!playwright.config.*"

icon: images/branding/icon.png

win:
  icon: images/branding/icon.ico
  target:
    - target: dir
      arch:
        - x64

mac:
  category: public.app-category.utilities
  icon: images/branding/icon.png
  darkModeSupport: true
  target:
    - target: dmg
      arch:
        - x64
        - arm64

dmg:
  title: K10Motorsports
  artifactName: K10-Motorsports-${version}-${arch}.${ext}
  contents:
    - x: 130
      "y": 220
    - x: 410
      "y": 220
      type: link
      path: /Applications

publish:
  provider: github
  owner: alternatekev
  repo: media-coach-simhub-plugin
  releaseType: release
